# ── User App — port 80 / yourdomain.com ──────────────────────────────────────
server {
    listen 6637;
    server_name 31.97.231.29;

    root /var/www/smart-parking/frontend/dist;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # FastAPI — all /api/* requests
    location /api/ {
        proxy_pass         http://127.0.0.1:6626;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        client_max_body_size 10M;
    }

    # Captured images served directly by FastAPI static mount
    location /images/ {
        proxy_pass         http://127.0.0.1:6626;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        expires 1d;
        add_header Cache-Control "public";
        client_max_body_size 10M;
    }
}

